<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 09 — NestJS Introduction</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 09 — NestJS Introduction</h1>
    <p class="subtitle">CLI, decorators, modules, controllers, services</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 6</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Code",
        text: "Quelle commande NestJS CLI genere un nouveau projet complet ?",
        code: "$ ??? new my-api\n\n? Which package manager would you like to use?\n  npm\n  yarn\n  pnpm",
        options: ["npx nest", "npx @nestjs/cli", "npm create nest", "nest init"],
        answer: 0,
        explanation: "La commande 'npx nest new my-api' (ou 'nest new' si le CLI est installe globalement) cree un projet NestJS complet avec TypeScript configure, la structure de dossiers, les tests, et les fichiers de configuration. Le CLI propose ensuite le choix du gestionnaire de paquets."
      },
      {
        label: "Concept",
        text: "Quels sont les trois piliers fondamentaux de l'architecture NestJS ?",
        code: null,
        options: [
          "Routes, Views, Models",
          "Controllers, Providers (Services), Modules",
          "Components, Templates, Directives",
          "Actions, Reducers, Store"
        ],
        answer: 1,
        explanation: "NestJS repose sur trois concepts cles : les Controllers (gestion des requetes HTTP), les Providers/Services (logique metier et acces aux donnees), et les Modules (organisation et encapsulation). Cette architecture s'inspire fortement d'Angular et facilite la separation des responsabilites."
      },
      {
        label: "Code",
        text: "Que fait le decorateur @Controller() dans ce code ?",
        code: "@Controller('users')\nexport class UsersController {\n  @Get()\n  findAll() {\n    return [];\n  }\n\n  @Get(':id')\n  findOne(@Param('id') id: string) {\n    return { id };\n  }\n}",
        options: [
          "Il cree automatiquement une base de donnees 'users'",
          "Il definit un prefixe de route '/users' pour toutes les methodes du controller",
          "Il importe le module Users",
          "Il genere une documentation Swagger"
        ],
        answer: 1,
        explanation: "@Controller('users') definit le prefixe de route '/users' pour toutes les methodes du controller. findAll() repondra a GET /users et findOne() a GET /users/:id. Les decorateurs @Get(), @Post(), etc. definissent les sous-routes et les methodes HTTP."
      },
      {
        label: "Code",
        text: "Comment le service est-il injecte dans ce controller NestJS ?",
        code: "@Controller('users')\nexport class UsersController {\n  constructor(private readonly usersService: UsersService) {}\n\n  @Get()\n  findAll() {\n    return this.usersService.findAll();\n  }\n}",
        options: [
          "Par un import direct avec require()",
          "Par injection de dependances via le constructeur",
          "Par un appel a new UsersService()",
          "Par une variable globale"
        ],
        answer: 1,
        explanation: "NestJS utilise l'injection de dependances (DI) : le service est declare comme parametre du constructeur avec son type TypeScript. Le conteneur IoC de NestJS cree automatiquement l'instance et l'injecte. Le mot-cle 'private readonly' cree et assigne la propriete en une seule ligne."
      },
      {
        label: "Pourquoi ?",
        text: "Pourquoi NestJS utilise-t-il des decorateurs TypeScript comme @Controller, @Get, @Injectable ?",
        code: null,
        options: [
          "Pour ameliorer les performances d'execution",
          "Parce que JavaScript ne supporte pas les classes",
          "Pour ajouter des metadonnees declaratives qui definissent le comportement sans modifier la logique metier",
          "Pour rendre le code compatible avec Angular"
        ],
        answer: 2,
        explanation: "Les decorateurs ajoutent des metadonnees aux classes et methodes de maniere declarative. @Controller('users') indique a NestJS que cette classe gere les routes /users, @Get() indique la methode HTTP, etc. Cela separe la configuration du framework de la logique metier, rendant le code plus lisible et maintenable."
      },
      {
        label: "Architecture",
        text: "Si tu veux faire tourner NestJS sur Fastify au lieu d'Express, qu'est-ce qui change en premier ?",
        code: "import { NestFactory } from '@nestjs/core';\nimport { FastifyAdapter } from '@nestjs/platform-fastify';",
        options: [
          "Il faut re-ecrire tous les controllers et services NestJS",
          "Il faut changer l'adaptateur HTTP au bootstrap et verifier les integrations liees a Express",
          "NestJS ne supporte Fastify que pour GraphQL",
          "Il faut abandonner les guards et les interceptors"
        ],
        answer: 1,
        explanation: "Le coeur de NestJS ne change pas : modules, controllers, services, guards et pipes restent les memes. Le changement principal se fait au niveau de l'adaptateur HTTP dans main.ts, puis dans la verification des plugins, middlewares et integrations qui etaient specifiques a Express."
      }
    ];

    let currentQuestion = 0, score = 0, answered = false;

    function renderQuestion() {
      if (currentQuestion >= questions.length) { showScore(); return; }
      const q = questions[currentQuestion];
      const pct = (currentQuestion / questions.length) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = 'Question ' + (currentQuestion + 1) + ' / ' + questions.length;
      let html = '<div class="card">';
      html += '<div class="question-label">' + q.label + '</div>';
      html += '<div class="question-text">' + q.text + '</div>';
      if (q.code) html += '<pre><code>' + q.code + '</code></pre>';
      html += '<ul class="options">';
      q.options.forEach(function(opt, i) {
        html += '<li><label><input type="radio" name="q" value="' + i + '"> ' + opt + '</label></li>';
      });
      html += '</ul>';
      html += '<button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button>';
      html += '<div class="feedback" id="feedback"></div>';
      html += '</div>';
      document.getElementById('quizContainer').innerHTML = html;
      document.getElementById('scoreContainer').classList.add('hidden');
      answered = false;
      document.querySelectorAll('input[name="q"]').forEach(function(input) {
        input.addEventListener('change', function() {
          document.getElementById('validateBtn').disabled = false;
        });
      });
    }

    function validate() {
      if (answered) return;
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      if (val === q.answer) {
        score++;
        fb.className = 'feedback correct';
        fb.innerHTML = '<strong>Correct !</strong> ' + q.explanation;
      } else {
        fb.className = 'feedback wrong';
        fb.innerHTML = '<strong>Incorrect.</strong> ' + q.explanation;
      }
      document.getElementById('validateBtn').disabled = true;
      setTimeout(function() { currentQuestion++; renderQuestion(); }, 3000);
    }

    function showScore() {
      document.getElementById('quizContainer').innerHTML = '';
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct >= 80 ? 'Excellent travail !' : pct >= 60 ? 'Bon travail, quelques points a revoir.' : 'Continuez a etudier, vous progresserez !';
      sc.innerHTML = '<div class="score">' + score + ' / ' + questions.length + '</div><div class="score-label">' + pct + '% — ' + msg + '</div><button class="btn-restart" onclick="restart()">Recommencer</button>';
    }

    function restart() { currentQuestion = 0; score = 0; answered = false; renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
