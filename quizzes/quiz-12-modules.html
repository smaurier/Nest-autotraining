<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 12 — Modules & Architecture</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 12 — Modules & Architecture</h1>
    <p class="subtitle">Feature modules, dynamic modules, @Global</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Code",
        text: "Que signifient les proprietes imports et exports dans un module NestJS ?",
        code: "@Module({\n  imports: [DatabaseModule],\n  controllers: [UsersController],\n  providers: [UsersService],\n  exports: [UsersService],\n})\nexport class UsersModule {}",
        options: [
          "imports charge des fichiers, exports les envoie sur le reseau",
          "imports rend les providers d'autres modules disponibles, exports partage les providers de ce module",
          "imports et exports gerent les dependances npm",
          "imports charge les controllers, exports les routes"
        ],
        answer: 1,
        explanation: "imports permet d'utiliser les providers exportes par d'autres modules (ici DatabaseModule). exports rend UsersService disponible pour tout module qui importera UsersModule. Sans exports, les providers restent prives au module. C'est le mecanisme d'encapsulation de NestJS."
      },
      {
        label: "Code",
        text: "Que fait le decorateur @Global() sur un module ?",
        code: "@Global()\n@Module({\n  providers: [LoggerService],\n  exports: [LoggerService],\n})\nexport class LoggerModule {}",
        options: [
          "Il rend le module accessible depuis le navigateur",
          "Il rend les providers exportes disponibles dans toute l'application sans import explicite",
          "Il empeche le module d'etre importe plusieurs fois",
          "Il instancie le module avant tous les autres"
        ],
        answer: 1,
        explanation: "@Global() rend les providers exportes du module disponibles partout dans l'application sans avoir besoin de l'importer dans chaque module. C'est utile pour les services transversaux (logger, config). Cependant, il faut l'utiliser avec parcimonie pour maintenir une architecture modulaire claire."
      },
      {
        label: "Concept",
        text: "Qu'est-ce qu'un module dynamique dans NestJS ?",
        code: null,
        options: [
          "Un module qui se recharge automatiquement en developpement",
          "Un module qui se configure via une methode statique forRoot() ou forRootAsync()",
          "Un module qui change de comportement a chaque requete",
          "Un module qui est charge de maniere lazy"
        ],
        answer: 1,
        explanation: "Un module dynamique expose une methode statique (forRoot, forRootAsync, register) qui retourne un DynamicModule configure. Cela permet de passer des options de configuration au module. Exemple : TypeOrmModule.forRoot({ type: 'postgres', ... }) configure la connexion a la base de donnees."
      },
      {
        label: "Pourquoi ?",
        text: "Pourquoi est-il recommande d'organiser une application NestJS en feature modules plutot que de tout mettre dans AppModule ?",
        code: null,
        options: [
          "Pour reduire le temps de compilation",
          "Pour encapsuler chaque fonctionnalite, faciliter la reutilisation et maintenir un code organise",
          "Parce que AppModule a une limite de providers",
          "Pour permettre le deploiement de chaque module separement"
        ],
        answer: 1,
        explanation: "Les feature modules (UsersModule, ProductsModule, etc.) encapsulent chaque domaine metier avec ses controllers, services et entites. Cela facilite la maintenance, la testabilite, la reutilisation dans d'autres projets, et permet aux equipes de travailler en parallele sur differents modules."
      },
      {
        label: "Code",
        text: "Comment configurer un module dynamique avec des options asynchrones ?",
        code: "@Module({})\nexport class MailModule {\n  static forRootAsync(options: {\n    useFactory: (...args: any[]) => MailConfig;\n    inject?: any[];\n  }): DynamicModule {\n    return {\n      module: MailModule,\n      providers: [\n        { provide: 'MAIL_CONFIG', ???: options.useFactory, inject: options.inject },\n        MailService,\n      ],\n      exports: [MailService],\n    };\n  }\n}",
        options: ["useValue", "useClass", "useFactory", "useExisting"],
        answer: 2,
        explanation: "useFactory permet de creer un provider avec une fonction factory, qui peut etre asynchrone et recevoir d'autres providers injectes. C'est le pattern standard pour les modules dynamiques qui dependent de la configuration (ConfigService) ou d'autres services asynchrones."
      }
    ];

    let currentQuestion = 0, score = 0, answered = false;

    function renderQuestion() {
      if (currentQuestion >= questions.length) { showScore(); return; }
      const q = questions[currentQuestion];
      const pct = (currentQuestion / questions.length) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = 'Question ' + (currentQuestion + 1) + ' / ' + questions.length;
      let html = '<div class="card">';
      html += '<div class="question-label">' + q.label + '</div>';
      html += '<div class="question-text">' + q.text + '</div>';
      if (q.code) html += '<pre><code>' + q.code + '</code></pre>';
      html += '<ul class="options">';
      q.options.forEach(function(opt, i) {
        html += '<li><label><input type="radio" name="q" value="' + i + '"> ' + opt + '</label></li>';
      });
      html += '</ul>';
      html += '<button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button>';
      html += '<div class="feedback" id="feedback"></div>';
      html += '</div>';
      document.getElementById('quizContainer').innerHTML = html;
      document.getElementById('scoreContainer').classList.add('hidden');
      answered = false;
      document.querySelectorAll('input[name="q"]').forEach(function(input) {
        input.addEventListener('change', function() {
          document.getElementById('validateBtn').disabled = false;
        });
      });
    }

    function validate() {
      if (answered) return;
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      if (val === q.answer) {
        score++;
        fb.className = 'feedback correct';
        fb.innerHTML = '<strong>Correct !</strong> ' + q.explanation;
      } else {
        fb.className = 'feedback wrong';
        fb.innerHTML = '<strong>Incorrect.</strong> ' + q.explanation;
      }
      document.getElementById('validateBtn').disabled = true;
      setTimeout(function() { currentQuestion++; renderQuestion(); }, 3000);
    }

    function showScore() {
      document.getElementById('quizContainer').innerHTML = '';
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct >= 80 ? 'Excellent travail !' : pct >= 60 ? 'Bon travail, quelques points a revoir.' : 'Continuez a etudier, vous progresserez !';
      sc.innerHTML = '<div class="score">' + score + ' / ' + questions.length + '</div><div class="score-label">' + pct + '% — ' + msg + '</div><button class="btn-restart" onclick="restart()">Recommencer</button>';
    }

    function restart() { currentQuestion = 0; score = 0; answered = false; renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
