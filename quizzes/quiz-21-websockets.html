<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 21 — WebSockets & Fichiers</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 21 — WebSockets & Fichiers</h1>
    <p class="subtitle">Multer, Socket.IO, Gateway</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Code",
        text: "Comment gerer l'upload de fichiers dans NestJS avec Multer ?",
        code: "@Post('upload')\n@UseInterceptors(FileInterceptor('file'))\nuploadFile(@???(\'file\') file: Express.Multer.File) {\n  return {\n    filename: file.originalname,\n    size: file.size,\n  };\n}",
        options: ["@Body", "@UploadedFile", "@File", "@Attachment"],
        answer: 1,
        explanation: "@UploadedFile() extrait le fichier uploade de la requete multipart/form-data. FileInterceptor('file') utilise Multer pour parser le champ 'file' du formulaire. L'objet file contient originalname, size, mimetype, buffer, etc. Pour plusieurs fichiers, on utilise FilesInterceptor et @UploadedFiles()."
      },
      {
        label: "Code",
        text: "Que fait ce Gateway WebSocket NestJS ?",
        code: "@WebSocketGateway({ cors: true })\nexport class ChatGateway {\n  @WebSocketServer()\n  server: Server;\n\n  @SubscribeMessage('message')\n  handleMessage(client: Socket, payload: { text: string }) {\n    this.server.emit('message', {\n      text: payload.text,\n      timestamp: new Date(),\n    });\n  }\n}",
        options: [
          "Il cree une API REST pour le chat",
          "Il ecoute l'evenement 'message' et le rediffuse a tous les clients connectes",
          "Il envoie des emails aux utilisateurs",
          "Il log les messages dans un fichier"
        ],
        answer: 1,
        explanation: "@WebSocketGateway cree un serveur WebSocket. @SubscribeMessage('message') ecoute l'evenement 'message' des clients. this.server.emit() diffuse le message a TOUS les clients connectes (broadcast). C'est le pattern classique d'un chat en temps reel."
      },
      {
        label: "Pourquoi ?",
        text: "Pourquoi utiliser les WebSockets plutot que du polling HTTP pour des donnees en temps reel ?",
        code: null,
        options: [
          "Les WebSockets sont plus simples a implementer",
          "Les WebSockets maintiennent une connexion bidirectionnelle permanente, eliminant la latence du polling",
          "Les WebSockets sont plus securises que HTTP",
          "Les WebSockets fonctionnent sans serveur"
        ],
        answer: 1,
        explanation: "Les WebSockets etablissent une connexion persistante bidirectionnelle. Le serveur peut envoyer des donnees aux clients instantanement sans attendre de requete. Le polling HTTP necessite des requetes repetees (toutes les X secondes), gaspillant de la bande passante et ajoutant de la latence."
      },
      {
        label: "Code",
        text: "Comment valider la taille et le type d'un fichier uploade dans NestJS ?",
        code: "@Post('avatar')\n@UseInterceptors(FileInterceptor('avatar', {\n  limits: { fileSize: 5 * 1024 * 1024 },\n  fileFilter: (req, file, cb) => {\n    if (!file.mimetype.???(\/image\\/\/)) {\n      cb(new BadRequestException('Only images allowed'), false);\n    }\n    cb(null, true);\n  },\n}))\nuploadAvatar(@UploadedFile() file: Express.Multer.File) {\n  return { url: `/uploads/${file.filename}` };\n}",
        options: ["startsWith", "match", "includes", "endsWith"],
        answer: 1,
        explanation: "file.mimetype.match(/image\\//) verifie que le MIME type commence par 'image/' (image/jpeg, image/png, etc.). limits.fileSize limite la taille a 5 Mo. Le fileFilter rejette les fichiers non conformes avec une BadRequestException. C'est essentiel pour la securite de l'upload."
      },
      {
        label: "Concept",
        text: "Comment les rooms (salles) fonctionnent-elles dans Socket.IO avec NestJS ?",
        code: null,
        options: [
          "Les rooms sont des bases de donnees separees",
          "Les rooms permettent de grouper des clients et d'envoyer des messages uniquement a un sous-ensemble de connexions",
          "Les rooms sont des routes HTTP differentes",
          "Les rooms limitent le nombre de connexions simultanees"
        ],
        answer: 1,
        explanation: "Les rooms sont des canaux virtuels dans Socket.IO. Un client peut rejoindre une room (client.join('room-1')) et le serveur peut emettre uniquement aux membres d'une room (this.server.to('room-1').emit('event', data)). C'est ideal pour les chats multi-salles, les notifications par groupe, etc."
      }
    ];

    let currentQuestion = 0, score = 0, answered = false;

    function renderQuestion() {
      if (currentQuestion >= questions.length) { showScore(); return; }
      const q = questions[currentQuestion];
      const pct = (currentQuestion / questions.length) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = 'Question ' + (currentQuestion + 1) + ' / ' + questions.length;
      let html = '<div class="card">';
      html += '<div class="question-label">' + q.label + '</div>';
      html += '<div class="question-text">' + q.text + '</div>';
      if (q.code) html += '<pre><code>' + q.code + '</code></pre>';
      html += '<ul class="options">';
      q.options.forEach(function(opt, i) {
        html += '<li><label><input type="radio" name="q" value="' + i + '"> ' + opt + '</label></li>';
      });
      html += '</ul>';
      html += '<button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button>';
      html += '<div class="feedback" id="feedback"></div>';
      html += '</div>';
      document.getElementById('quizContainer').innerHTML = html;
      document.getElementById('scoreContainer').classList.add('hidden');
      answered = false;
      document.querySelectorAll('input[name="q"]').forEach(function(input) {
        input.addEventListener('change', function() {
          document.getElementById('validateBtn').disabled = false;
        });
      });
    }

    function validate() {
      if (answered) return;
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      if (val === q.answer) {
        score++;
        fb.className = 'feedback correct';
        fb.innerHTML = '<strong>Correct !</strong> ' + q.explanation;
      } else {
        fb.className = 'feedback wrong';
        fb.innerHTML = '<strong>Incorrect.</strong> ' + q.explanation;
      }
      document.getElementById('validateBtn').disabled = true;
      setTimeout(function() { currentQuestion++; renderQuestion(); }, 3000);
    }

    function showScore() {
      document.getElementById('quizContainer').innerHTML = '';
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct >= 80 ? 'Excellent travail !' : pct >= 60 ? 'Bon travail, quelques points a revoir.' : 'Continuez a etudier, vous progresserez !';
      sc.innerHTML = '<div class="score">' + score + ' / ' + questions.length + '</div><div class="score-label">' + pct + '% — ' + msg + '</div><button class="btn-restart" onclick="restart()">Recommencer</button>';
    }

    function restart() { currentQuestion = 0; score = 0; answered = false; renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
