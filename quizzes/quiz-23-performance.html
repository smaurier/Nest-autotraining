<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz 23 — Performance & Deploiement</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        min-height: 100vh;
        padding: 2rem 1rem;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      h1 {
        text-align: center;
        margin-bottom: 0.5rem;
        font-size: 1.8rem;
        color: #ffffff;
      }
      .subtitle {
        text-align: center;
        color: #8892b0;
        margin-bottom: 2rem;
        font-size: 1rem;
      }
      .progress-bar-container {
        background: #0d1117;
        border-radius: 10px;
        height: 14px;
        margin-bottom: 2rem;
        overflow: hidden;
      }
      .progress-bar {
        background: linear-gradient(90deg, #0d6efd, #4dabf7);
        height: 100%;
        width: 0%;
        border-radius: 10px;
        transition: width 0.4s ease;
      }
      .progress-text {
        text-align: center;
        color: #8892b0;
        margin-bottom: 1rem;
        font-size: 0.9rem;
      }
      .card {
        background: #16213e;
        border-radius: 12px;
        padding: 2rem;
        margin-bottom: 1.5rem;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }
      .question-label {
        font-size: 0.85rem;
        color: #4dabf7;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 0.5rem;
      }
      .question-text {
        font-size: 1.15rem;
        margin-bottom: 1.2rem;
        line-height: 1.5;
        color: #ffffff;
      }
      pre {
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1.2rem;
        overflow-x: auto;
        font-size: 0.95rem;
      }
      code {
        font-family: "Consolas", "Fira Code", "Courier New", monospace;
        color: #c9d1d9;
      }
      .options {
        list-style: none;
      }
      .options li {
        margin-bottom: 0.5rem;
      }
      .options label {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.8rem 1rem;
        background: #0d1117;
        border: 2px solid #30363d;
        border-radius: 8px;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
        font-size: 1rem;
      }
      .options label:hover {
        border-color: #4dabf7;
        background: #1c2a4a;
      }
      .options input[type="radio"] {
        accent-color: #0d6efd;
        width: 18px;
        height: 18px;
        flex-shrink: 0;
      }
      .btn {
        display: inline-block;
        padding: 0.7rem 2rem;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.1s;
      }
      .btn-primary {
        background: #0d6efd;
        color: #fff;
      }
      .btn-primary:hover {
        background: #3b82f6;
      }
      .btn-primary:disabled {
        background: #374151;
        cursor: not-allowed;
      }
      .btn-restart {
        background: #238636;
        color: #fff;
        margin-top: 1rem;
        padding: 0.7rem 2rem;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-restart:hover {
        background: #2ea043;
      }
      .feedback {
        margin-top: 1rem;
        padding: 1rem 1.2rem;
        border-radius: 8px;
        font-size: 0.95rem;
        line-height: 1.5;
        display: none;
      }
      .feedback.correct {
        background: #0f5132;
        border: 1px solid #198754;
        color: #d1fae5;
        display: block;
      }
      .feedback.wrong {
        background: #842029;
        border: 1px solid #dc3545;
        color: #fdd;
        display: block;
      }
      .score-card {
        text-align: center;
        padding: 3rem 2rem;
      }
      .score-card .score {
        font-size: 3rem;
        font-weight: 700;
        color: #4dabf7;
        margin-bottom: 0.5rem;
      }
      .score-card .score-label {
        font-size: 1.2rem;
        color: #8892b0;
        margin-bottom: 1.5rem;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Quiz 23 — Performance & Deploiement</h1>
      <p class="subtitle">Cache, throttler, Docker, health checks</p>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <p class="progress-text" id="progressText">Question 1 / 5</p>
      <div id="quizContainer"></div>
      <div id="scoreContainer" class="card score-card hidden"></div>
    </div>
    <script>
      const questions = [
        {
          label: "Code",
          text: "Comment ajouter du caching sur une route NestJS ?",
          code: "@Controller('products')\nexport class ProductsController {\n  @Get()\n  @???(30)\n  findAll() {\n    return this.productsService.findAll();\n  }\n}",
          options: ["@Cache", "@CacheTTL", "@Cached", "@UseCache"],
          answer: 1,
          explanation:
            "@CacheTTL(30) definit le temps de vie du cache a 30 secondes pour cette route. Combine avec @UseInterceptors(CacheInterceptor), la premiere requete execute la logique, et les requetes suivantes (dans les 30s) retournent la reponse en cache sans appeler le service. Cela reduit la charge sur la base de donnees.",
        },
        {
          label: "Code",
          text: "Que fait le ThrottlerModule dans cette configuration ?",
          code: "@Module({\n  imports: [\n    ThrottlerModule.forRoot([{\n      ttl: 60000,\n      limit: 10,\n    }]),\n  ],\n})\nexport class AppModule {}",
          options: [
            "Il compresse les reponses HTTP",
            "Il limite chaque IP a 10 requetes par minute (rate limiting)",
            "Il accelere le traitement des requetes",
            "Il met en cache les 10 dernieres reponses",
          ],
          answer: 1,
          explanation:
            "ThrottlerModule implemente le rate limiting : chaque adresse IP est limitee a 10 requetes par fenetre de 60 secondes (60000ms). Au-dela, une erreur 429 Too Many Requests est renvoyee. C'est essentiel pour proteger l'API contre les abus et les attaques par deni de service (DDoS).",
        },
        {
          label: "Code",
          text: "Quel est l'avantage du multi-stage build dans ce Dockerfile ?",
          code: '# Stage 1: Build\nFROM node:20-alpine AS builder\nWORKDIR /app\nCOPY package*.json ./\nRUN npm ci\nCOPY . .\nRUN npm run build\n\n# Stage 2: Production\nFROM node:20-alpine\nWORKDIR /app\nCOPY --from=builder /app/dist ./dist\nCOPY --from=builder /app/node_modules ./node_modules\nCMD ["node", "dist/main.js"]',
          options: [
            "Il permet de builder plus vite",
            "Il reduit la taille de l'image finale en excluant les outils de build et les fichiers sources",
            "Il permet de deployer sur plusieurs serveurs",
            "Il cree deux conteneurs Docker",
          ],
          answer: 1,
          explanation:
            "Le multi-stage build utilise un premier stage (builder) pour compiler TypeScript, puis copie uniquement les fichiers necessaires (dist et node_modules) dans l'image finale. Le code source, les devDependencies, et les outils de build sont exclus, resultant en une image beaucoup plus legere et securisee.",
        },
        {
          label: "Code",
          text: "Comment implementer un health check dans NestJS ?",
          code: "@Controller('health')\nexport class HealthController {\n  constructor(\n    private health: HealthCheckService,\n    private db: TypeOrmHealthIndicator,\n  ) {}\n\n  @Get()\n  @HealthCheck()\n  check() {\n    return this.health.check([\n      () => this.db.???(\'database\'),\n    ]);\n  }\n}",
          options: ["isConnected", "pingCheck", "status", "verify"],
          answer: 1,
          explanation:
            "db.pingCheck('database') verifie que la connexion a la base de donnees fonctionne. Le HealthCheckService agrege les resultats de tous les indicateurs (database, disk, memory, etc.) et retourne un statut global. Les health checks sont essentiels pour les orchestrateurs (Kubernetes, Docker) qui surveillent l'etat de l'application.",
        },
        {
          label: "BFF",
          text: "Quel indicateur est le plus utile pour piloter la performance d'un endpoint BFF critique ?",
          code: null,
          options: [
            "Le nombre total de lignes de code du BFF",
            "La taille du container Docker uniquement",
            "La latence p95 par route BFF, avec taux d'erreur et taux de fallback",
            "Le nombre de branches Git",
          ],
          answer: 2,
          explanation:
            "Un BFF orchestre plusieurs appels reseau. La latence p95 par route, completee par le taux d'erreur et le taux de degradation/fallback, donne une vision actionnable de l'experience frontend reelle.",
        },
      ];

      let currentQuestion = 0,
        score = 0,
        answered = false;

      function renderQuestion() {
        if (currentQuestion >= questions.length) {
          showScore();
          return;
        }
        const q = questions[currentQuestion];
        const pct = (currentQuestion / questions.length) * 100;
        document.getElementById("progressBar").style.width = pct + "%";
        document.getElementById("progressText").textContent =
          "Question " + (currentQuestion + 1) + " / " + questions.length;
        let html = '<div class="card">';
        html += '<div class="question-label">' + q.label + "</div>";
        html += '<div class="question-text">' + q.text + "</div>";
        if (q.code) html += "<pre><code>" + q.code + "</code></pre>";
        html += '<ul class="options">';
        q.options.forEach(function (opt, i) {
          html +=
            '<li><label><input type="radio" name="q" value="' +
            i +
            '"> ' +
            opt +
            "</label></li>";
        });
        html += "</ul>";
        html +=
          '<button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button>';
        html += '<div class="feedback" id="feedback"></div>';
        html += "</div>";
        document.getElementById("quizContainer").innerHTML = html;
        document.getElementById("scoreContainer").classList.add("hidden");
        answered = false;
        document.querySelectorAll('input[name="q"]').forEach(function (input) {
          input.addEventListener("change", function () {
            document.getElementById("validateBtn").disabled = false;
          });
        });
      }

      function validate() {
        if (answered) return;
        answered = true;
        const selected = document.querySelector('input[name="q"]:checked');
        if (!selected) return;
        const val = parseInt(selected.value);
        const q = questions[currentQuestion];
        const fb = document.getElementById("feedback");
        if (val === q.answer) {
          score++;
          fb.className = "feedback correct";
          fb.innerHTML = "<strong>Correct !</strong> " + q.explanation;
        } else {
          fb.className = "feedback wrong";
          fb.innerHTML = "<strong>Incorrect.</strong> " + q.explanation;
        }
        document.getElementById("validateBtn").disabled = true;
        setTimeout(function () {
          currentQuestion++;
          renderQuestion();
        }, 3000);
      }

      function showScore() {
        document.getElementById("quizContainer").innerHTML = "";
        document.getElementById("progressBar").style.width = "100%";
        document.getElementById("progressText").textContent = "Termine !";
        const sc = document.getElementById("scoreContainer");
        sc.classList.remove("hidden");
        const pct = Math.round((score / questions.length) * 100);
        let msg =
          pct >= 80
            ? "Excellent travail !"
            : pct >= 60
              ? "Bon travail, quelques points a revoir."
              : "Continuez a etudier, vous progresserez !";
        sc.innerHTML =
          '<div class="score">' +
          score +
          " / " +
          questions.length +
          '</div><div class="score-label">' +
          pct +
          "% — " +
          msg +
          '</div><button class="btn-restart" onclick="restart()">Recommencer</button>';
      }

      function restart() {
        currentQuestion = 0;
        score = 0;
        answered = false;
        renderQuestion();
      }
      renderQuestion();
    </script>
  </body>
</html>
