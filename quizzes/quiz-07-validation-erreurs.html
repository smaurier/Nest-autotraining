<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 07 — Validation & Erreurs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 07 — Validation & Erreurs</h1>
    <p class="subtitle">Zod, error handling, async wrapper</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Code",
        text: "Que fait ce schema Zod ?",
        code: "import { z } from 'zod';\n\nconst createUserSchema = z.object({\n  email: z.string().email(),\n  name: z.string().min(2).max(50),\n  age: z.number().int().positive().optional(),\n});",
        options: [
          "Il cree un utilisateur en base de donnees",
          "Il definit un schema de validation avec email obligatoire, nom entre 2 et 50 caracteres, et age optionnel",
          "Il genere une table SQL automatiquement",
          "Il cree un type TypeScript sans validation runtime"
        ],
        answer: 1,
        explanation: "Zod definit un schema de validation runtime : email doit etre un string au format email, name un string de 2 a 50 caracteres, et age est un entier positif optionnel. Zod valide les donnees a l'execution ET infere automatiquement les types TypeScript."
      },
      {
        label: "Code",
        text: "Comment utiliser un schema Zod pour valider les donnees d'une requete Express ?",
        code: "app.post('/api/users', (req, res) => {\n  const result = createUserSchema.???(req.body);\n  if (!result.success) {\n    return res.status(400).json(result.error);\n  }\n  // utiliser result.data\n});",
        options: ["validate", "parse", "safeParse", "check"],
        answer: 2,
        explanation: "safeParse() retourne un objet { success, data, error } sans lancer d'exception. Contrairement a parse() qui lance une ZodError en cas d'echec, safeParse() permet de gerer l'erreur de maniere elegante en verifiant result.success."
      },
      {
        label: "Pourquoi ?",
        text: "Pourquoi est-il important de valider les donnees cote serveur meme si le front-end effectue deja une validation ?",
        code: null,
        options: [
          "Pour doubler les performances de validation",
          "Parce que la validation cote client peut etre contournee et les requetes peuvent venir de n'importe quelle source",
          "Parce que le front-end ne peut pas valider les emails",
          "Pour eviter d'utiliser TypeScript"
        ],
        answer: 1,
        explanation: "La validation front-end ameliore l'UX mais n'est pas fiable cote securite : un attaquant peut envoyer des requetes directement via curl, Postman ou un script. La validation serveur est la derniere ligne de defense contre les donnees invalides ou malveillantes (injection SQL, XSS, etc.)."
      },
      {
        label: "Code",
        text: "Quel est le role de cet async wrapper ?",
        code: "const asyncHandler = (fn) => (req, res, next) => {\n  Promise.resolve(fn(req, res, next)).catch(next);\n};\n\napp.get('/api/users', asyncHandler(async (req, res) => {\n  const users = await db.query('SELECT * FROM users');\n  res.json(users);\n}));",
        options: [
          "Il rend les routes synchrones plus rapides",
          "Il capture automatiquement les erreurs des fonctions async et les transmet au middleware d'erreur",
          "Il ajoute un timeout aux requetes",
          "Il met en cache les resultats des requetes"
        ],
        answer: 1,
        explanation: "L'async wrapper capture les rejections de Promises (erreurs async) et les passe a next(), ce qui les redirige vers le middleware d'erreur Express. Sans ce wrapper, une erreur dans une route async ne serait pas attrapee par Express et causerait un crash ou une requete bloquee."
      },
      {
        label: "Concept",
        text: "Quelle est la difference entre une erreur operationnelle et une erreur de programmation ?",
        code: null,
        options: [
          "Il n'y a aucune difference",
          "Les erreurs operationnelles sont previsibles (reseau, validation), les erreurs de programmation sont des bugs",
          "Les erreurs operationnelles sont plus graves",
          "Les erreurs de programmation ne peuvent pas etre attrapees"
        ],
        answer: 1,
        explanation: "Les erreurs operationnelles sont previsibles et recoverables (timeout reseau, validation echouee, fichier introuvable). Les erreurs de programmation sont des bugs (TypeError, ReferenceError). On gere les premieres avec des codes HTTP appropries, les secondes doivent etre corrigees dans le code."
      }
    ];

    let currentQuestion = 0, score = 0, answered = false;

    function renderQuestion() {
      if (currentQuestion >= questions.length) { showScore(); return; }
      const q = questions[currentQuestion];
      const pct = (currentQuestion / questions.length) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = 'Question ' + (currentQuestion + 1) + ' / ' + questions.length;
      let html = '<div class="card">';
      html += '<div class="question-label">' + q.label + '</div>';
      html += '<div class="question-text">' + q.text + '</div>';
      if (q.code) html += '<pre><code>' + q.code + '</code></pre>';
      html += '<ul class="options">';
      q.options.forEach(function(opt, i) {
        html += '<li><label><input type="radio" name="q" value="' + i + '"> ' + opt + '</label></li>';
      });
      html += '</ul>';
      html += '<button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button>';
      html += '<div class="feedback" id="feedback"></div>';
      html += '</div>';
      document.getElementById('quizContainer').innerHTML = html;
      document.getElementById('scoreContainer').classList.add('hidden');
      answered = false;
      document.querySelectorAll('input[name="q"]').forEach(function(input) {
        input.addEventListener('change', function() {
          document.getElementById('validateBtn').disabled = false;
        });
      });
    }

    function validate() {
      if (answered) return;
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      if (val === q.answer) {
        score++;
        fb.className = 'feedback correct';
        fb.innerHTML = '<strong>Correct !</strong> ' + q.explanation;
      } else {
        fb.className = 'feedback wrong';
        fb.innerHTML = '<strong>Incorrect.</strong> ' + q.explanation;
      }
      document.getElementById('validateBtn').disabled = true;
      setTimeout(function() { currentQuestion++; renderQuestion(); }, 3000);
    }

    function showScore() {
      document.getElementById('quizContainer').innerHTML = '';
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct >= 80 ? 'Excellent travail !' : pct >= 60 ? 'Bon travail, quelques points a revoir.' : 'Continuez a etudier, vous progresserez !';
      sc.innerHTML = '<div class="score">' + score + ' / ' + questions.length + '</div><div class="score-label">' + pct + '% — ' + msg + '</div><button class="btn-restart" onclick="restart()">Recommencer</button>';
    }

    function restart() { currentQuestion = 0; score = 0; answered = false; renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
