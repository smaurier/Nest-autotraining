<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 24 — Projet Final</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 24 — Projet Final</h1>
    <p class="subtitle">E-commerce API, architecture, best practices</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Code",
        text: "Quelle architecture de modules serait appropriee pour une API e-commerce NestJS ?",
        code: "@Module({\n  imports: [\n    ConfigModule.forRoot({ isGlobal: true }),\n    TypeOrmModule.forRootAsync({ ... }),\n    AuthModule,\n    UsersModule,\n    ProductsModule,\n    OrdersModule,\n    PaymentsModule,\n    ???,\n  ],\n})\nexport class AppModule {}",
        options: ["AppController", "MailModule", "index.ts", "main.ts"],
        answer: 1,
        explanation: "Une API e-commerce typique inclut des feature modules pour chaque domaine : Auth (authentification), Users (gestion des comptes), Products (catalogue), Orders (commandes), Payments (paiements) et MailModule (notifications par email). Chaque module encapsule ses controllers, services et entites."
      },
      {
        label: "Code",
        text: "Comment structurer une commande (order) avec ses relations dans une API e-commerce ?",
        code: "@Entity()\nexport class Order {\n  @PrimaryGeneratedColumn('uuid')\n  id: string;\n\n  @ManyToOne(() => User)\n  user: User;\n\n  @OneToMany(() => OrderItem, item => item.order, { ???: true })\n  items: OrderItem[];\n\n  @Column({ type: 'enum', enum: OrderStatus, default: OrderStatus.PENDING })\n  status: OrderStatus;\n\n  @Column({ type: 'decimal', precision: 10, scale: 2 })\n  total: number;\n}",
        options: ["eager", "cascade", "lazy", "nullable"],
        answer: 1,
        explanation: "cascade: true permet de creer les OrderItems automatiquement lors de la sauvegarde d'une Order. On cree l'Order avec ses items en une seule operation, et TypeORM insere tout dans une transaction. Le status utilise un enum PostgreSQL pour garantir des valeurs valides, et le total utilise decimal pour la precision monetaire."
      },
      {
        label: "Pourquoi ?",
        text: "Pourquoi est-il crucial d'utiliser des transactions pour le processus de commande dans une API e-commerce ?",
        code: null,
        options: [
          "Pour accelerer le traitement des commandes",
          "Pour garantir que toutes les etapes (creation commande, mise a jour stock, paiement) reussissent ou echouent ensemble",
          "Parce que TypeORM l'exige pour toutes les operations",
          "Pour eviter d'utiliser des Promises"
        ],
        answer: 1,
        explanation: "Une commande implique plusieurs operations liees : creer la commande, deduire le stock, initier le paiement. Si le paiement echoue apres la deduction du stock, les donnees seraient incoherentes. La transaction garantit l'atomicite : tout reussit ou tout est annule (rollback), preservant l'integrite des donnees."
      },
      {
        label: "Concept",
        text: "Quelles sont les bonnes pratiques pour securiser une API NestJS en production ?",
        code: null,
        options: [
          "Utiliser uniquement HTTPS",
          "Combiner helmet, CORS, rate limiting, validation des entrees, authentification JWT et logging",
          "Desactiver les logs pour les performances",
          "Utiliser une seule cle API pour tous les utilisateurs"
        ],
        answer: 1,
        explanation: "La securite en production est multi-couches : helmet (headers securises), CORS (controle des origines), rate limiting (prevention DDoS), ValidationPipe (validation des entrees contre les injections), JWT (authentification), Guards RBAC (autorisation), et logging structure (detection d'anomalies et audit)."
      },
      {
        label: "Code",
        text: "Comment organiser le code pour qu'il soit maintenable et testable a long terme ?",
        code: "// Quelle approche est recommandee ?\n\n// Option A: Tout dans le controller\n@Post()\ncreate(@Body() dto) {\n  const user = await this.repo.save(dto);\n  await this.mailer.send(user.email);\n  return user;\n}\n\n// Option B: Separation des responsabilites\n@Post()\ncreate(@Body() dto: CreateUserDto) {\n  return this.usersService.create(dto);\n}",
        options: [
          "Option A : tout dans le controller est plus simple",
          "Option B : le controller delegue au service qui contient la logique metier",
          "Les deux options sont equivalentes",
          "Aucune des deux n'est correcte"
        ],
        answer: 1,
        explanation: "L'option B suit le principe de separation des responsabilites : le controller gere uniquement la requete/reponse HTTP, le service contient la logique metier. Cela facilite les tests (on peut tester le service independamment), la reutilisation (le service peut etre appele depuis un cron, une queue, etc.) et la maintenance."
      }
    ];

    let currentQuestion = 0, score = 0, answered = false;

    function renderQuestion() {
      if (currentQuestion >= questions.length) { showScore(); return; }
      const q = questions[currentQuestion];
      const pct = (currentQuestion / questions.length) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = 'Question ' + (currentQuestion + 1) + ' / ' + questions.length;
      let html = '<div class="card">';
      html += '<div class="question-label">' + q.label + '</div>';
      html += '<div class="question-text">' + q.text + '</div>';
      if (q.code) html += '<pre><code>' + q.code + '</code></pre>';
      html += '<ul class="options">';
      q.options.forEach(function(opt, i) {
        html += '<li><label><input type="radio" name="q" value="' + i + '"> ' + opt + '</label></li>';
      });
      html += '</ul>';
      html += '<button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button>';
      html += '<div class="feedback" id="feedback"></div>';
      html += '</div>';
      document.getElementById('quizContainer').innerHTML = html;
      document.getElementById('scoreContainer').classList.add('hidden');
      answered = false;
      document.querySelectorAll('input[name="q"]').forEach(function(input) {
        input.addEventListener('change', function() {
          document.getElementById('validateBtn').disabled = false;
        });
      });
    }

    function validate() {
      if (answered) return;
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      if (val === q.answer) {
        score++;
        fb.className = 'feedback correct';
        fb.innerHTML = '<strong>Correct !</strong> ' + q.explanation;
      } else {
        fb.className = 'feedback wrong';
        fb.innerHTML = '<strong>Incorrect.</strong> ' + q.explanation;
      }
      document.getElementById('validateBtn').disabled = true;
      setTimeout(function() { currentQuestion++; renderQuestion(); }, 3000);
    }

    function showScore() {
      document.getElementById('quizContainer').innerHTML = '';
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct >= 80 ? 'Excellent travail !' : pct >= 60 ? 'Bon travail, quelques points a revoir.' : 'Continuez a etudier, vous progresserez !';
      sc.innerHTML = '<div class="score">' + score + ' / ' + questions.length + '</div><div class="score-label">' + pct + '% — ' + msg + '</div><button class="btn-restart" onclick="restart()">Recommencer</button>';
    }

    function restart() { currentQuestion = 0; score = 0; answered = false; renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
