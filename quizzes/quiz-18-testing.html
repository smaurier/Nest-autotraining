<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz 18 — Testing NestJS</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: #1a1a2e;
        color: #e0e0e0;
        min-height: 100vh;
        padding: 2rem 1rem;
      }
      .container {
        max-width: 800px;
        margin: 0 auto;
      }
      h1 {
        text-align: center;
        margin-bottom: 0.5rem;
        font-size: 1.8rem;
        color: #ffffff;
      }
      .subtitle {
        text-align: center;
        color: #8892b0;
        margin-bottom: 2rem;
        font-size: 1rem;
      }
      .progress-bar-container {
        background: #0d1117;
        border-radius: 10px;
        height: 14px;
        margin-bottom: 2rem;
        overflow: hidden;
      }
      .progress-bar {
        background: linear-gradient(90deg, #0d6efd, #4dabf7);
        height: 100%;
        width: 0%;
        border-radius: 10px;
        transition: width 0.4s ease;
      }
      .progress-text {
        text-align: center;
        color: #8892b0;
        margin-bottom: 1rem;
        font-size: 0.9rem;
      }
      .card {
        background: #16213e;
        border-radius: 12px;
        padding: 2rem;
        margin-bottom: 1.5rem;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
      }
      .question-label {
        font-size: 0.85rem;
        color: #4dabf7;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 0.5rem;
      }
      .question-text {
        font-size: 1.15rem;
        margin-bottom: 1.2rem;
        line-height: 1.5;
        color: #ffffff;
      }
      pre {
        background: #0d1117;
        border: 1px solid #30363d;
        border-radius: 8px;
        padding: 1rem;
        margin-bottom: 1.2rem;
        overflow-x: auto;
        font-size: 0.95rem;
      }
      code {
        font-family: "Consolas", "Fira Code", "Courier New", monospace;
        color: #c9d1d9;
      }
      .options {
        list-style: none;
      }
      .options li {
        margin-bottom: 0.5rem;
      }
      .options label {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.8rem 1rem;
        background: #0d1117;
        border: 2px solid #30363d;
        border-radius: 8px;
        cursor: pointer;
        transition:
          border-color 0.2s,
          background 0.2s;
        font-size: 1rem;
      }
      .options label:hover {
        border-color: #4dabf7;
        background: #1c2a4a;
      }
      .options input[type="radio"] {
        accent-color: #0d6efd;
        width: 18px;
        height: 18px;
        flex-shrink: 0;
      }
      .btn {
        display: inline-block;
        padding: 0.7rem 2rem;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        transition:
          background 0.2s,
          transform 0.1s;
      }
      .btn-primary {
        background: #0d6efd;
        color: #fff;
      }
      .btn-primary:hover {
        background: #3b82f6;
      }
      .btn-primary:disabled {
        background: #374151;
        cursor: not-allowed;
      }
      .btn-restart {
        background: #238636;
        color: #fff;
        margin-top: 1rem;
        padding: 0.7rem 2rem;
        border: none;
        border-radius: 8px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
      }
      .btn-restart:hover {
        background: #2ea043;
      }
      .feedback {
        margin-top: 1rem;
        padding: 1rem 1.2rem;
        border-radius: 8px;
        font-size: 0.95rem;
        line-height: 1.5;
        display: none;
      }
      .feedback.correct {
        background: #0f5132;
        border: 1px solid #198754;
        color: #d1fae5;
        display: block;
      }
      .feedback.wrong {
        background: #842029;
        border: 1px solid #dc3545;
        color: #fdd;
        display: block;
      }
      .score-card {
        text-align: center;
        padding: 3rem 2rem;
      }
      .score-card .score {
        font-size: 3rem;
        font-weight: 700;
        color: #4dabf7;
        margin-bottom: 0.5rem;
      }
      .score-card .score-label {
        font-size: 1.2rem;
        color: #8892b0;
        margin-bottom: 1.5rem;
      }
      .hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Quiz 18 — Testing NestJS</h1>
      <p class="subtitle">Jest, unit tests, E2E, mocking</p>
      <div class="progress-bar-container">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <p class="progress-text" id="progressText">Question 1 / 5</p>
      <div id="quizContainer"></div>
      <div id="scoreContainer" class="card score-card hidden"></div>
    </div>
    <script>
      const questions = [
        {
          label: "Code",
          text: "Que fait Test.createTestingModule() dans ce test unitaire NestJS ?",
          code: "describe('UsersService', () => {\n  let service: UsersService;\n\n  beforeEach(async () => {\n    const module = await Test.createTestingModule({\n      providers: [UsersService],\n    }).compile();\n\n    service = module.get&lt;UsersService&gt;(UsersService);\n  });\n\n  it('should be defined', () => {\n    expect(service).toBeDefined();\n  });\n});",
          options: [
            "Il cree un vrai serveur NestJS",
            "Il cree un module de test isole avec l'injection de dependances pour tester le service",
            "Il genere automatiquement les tests",
            "Il compile le code TypeScript",
          ],
          answer: 1,
          explanation:
            "Test.createTestingModule() cree un module NestJS isole avec le systeme de DI fonctionnel. Cela permet de tester le service avec ses dependances (ou des mocks). module.get() recupere l'instance du service creee par le conteneur DI. C'est la base de tout test unitaire NestJS.",
        },
        {
          label: "Code",
          text: "Comment mocker un service dans un test unitaire NestJS ?",
          code: "const module = await Test.createTestingModule({\n  providers: [\n    UsersController,\n    {\n      provide: UsersService,\n      ???: {\n        findAll: jest.fn().mockResolvedValue([{ id: 1, name: 'Alice' }]),\n        findOne: jest.fn().mockResolvedValue({ id: 1, name: 'Alice' }),\n      },\n    },\n  ],\n}).compile();",
          options: ["useClass", "useValue", "useFactory", "useMock"],
          answer: 1,
          explanation:
            "useValue remplace le vrai service par un objet mock contenant des fonctions jest.fn(). mockResolvedValue simule une Promise resolue. Cela isole completement le controller du service reel, permettant de tester uniquement la logique du controller sans base de donnees ni dependances externes.",
        },
        {
          label: "Code",
          text: "Comment ecrire un test E2E (end-to-end) dans NestJS ?",
          code: "describe('Users (e2e)', () => {\n  let app: INestApplication;\n\n  beforeAll(async () => {\n    const module = await Test.createTestingModule({\n      imports: [AppModule],\n    }).compile();\n    app = module.createNestApplication();\n    await app.init();\n  });\n\n  it('GET /users', () => {\n    return ???(app.getHttpServer())\n      .get('/users')\n      .expect(200)\n      .expect([]);\n  });\n});",
          options: ["fetch", "request", "axios", "http"],
          answer: 1,
          explanation:
            "request() vient de la librairie supertest et permet de faire des requetes HTTP sur l'application NestJS. Le test E2E demarre toute l'application (avec base de donnees, middleware, etc.) et teste les endpoints complets. C'est complementaire aux tests unitaires qui testent chaque composant isolement.",
        },
        {
          label: "Pourquoi ?",
          text: "Pourquoi est-il important de mocker les dependances dans les tests unitaires ?",
          code: null,
          options: [
            "Pour accelerer la compilation TypeScript",
            "Pour isoler le composant teste et eviter les effets de bord des dependances externes (DB, API, etc.)",
            "Parce que Jest ne supporte pas les vraies dependances",
            "Pour reduire la couverture de code necessaire",
          ],
          answer: 1,
          explanation:
            "Le mocking isole le composant teste : on ne teste que sa logique, pas celle de ses dependances. Sans mocking, un test du controller testerait aussi le service, la base de donnees, etc. Les tests deviendraient lents, fragiles et difficiles a maintenir. Les tests E2E couvrent l'integration complete.",
        },
        {
          label: "BFF",
          text: "Quelle couverture de tests est la plus pertinente pour un BFF ?",
          code: null,
          options: [
            "Uniquement des tests unitaires de repository",
            "Unitaires de mapping, integration d'orchestration, tests contrat front-BFF, E2E sur parcours critiques",
            "Uniquement des tests E2E manuels",
            "Aucun test tant que le front fonctionne",
          ],
          answer: 1,
          explanation:
            "Le BFF doit garantir un contrat stable vers le frontend tout en absorbant les changements upstream. Il faut donc combiner tests de mapping, orchestration, contrat et parcours E2E critiques.",
        },
      ];

      let currentQuestion = 0,
        score = 0,
        answered = false;

      function renderQuestion() {
        if (currentQuestion >= questions.length) {
          showScore();
          return;
        }
        const q = questions[currentQuestion];
        const pct = (currentQuestion / questions.length) * 100;
        document.getElementById("progressBar").style.width = pct + "%";
        document.getElementById("progressText").textContent =
          "Question " + (currentQuestion + 1) + " / " + questions.length;
        let html = '<div class="card">';
        html += '<div class="question-label">' + q.label + "</div>";
        html += '<div class="question-text">' + q.text + "</div>";
        if (q.code) html += "<pre><code>" + q.code + "</code></pre>";
        html += '<ul class="options">';
        q.options.forEach(function (opt, i) {
          html +=
            '<li><label><input type="radio" name="q" value="' +
            i +
            '"> ' +
            opt +
            "</label></li>";
        });
        html += "</ul>";
        html +=
          '<button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button>';
        html += '<div class="feedback" id="feedback"></div>';
        html += "</div>";
        document.getElementById("quizContainer").innerHTML = html;
        document.getElementById("scoreContainer").classList.add("hidden");
        answered = false;
        document.querySelectorAll('input[name="q"]').forEach(function (input) {
          input.addEventListener("change", function () {
            document.getElementById("validateBtn").disabled = false;
          });
        });
      }

      function validate() {
        if (answered) return;
        answered = true;
        const selected = document.querySelector('input[name="q"]:checked');
        if (!selected) return;
        const val = parseInt(selected.value);
        const q = questions[currentQuestion];
        const fb = document.getElementById("feedback");
        if (val === q.answer) {
          score++;
          fb.className = "feedback correct";
          fb.innerHTML = "<strong>Correct !</strong> " + q.explanation;
        } else {
          fb.className = "feedback wrong";
          fb.innerHTML = "<strong>Incorrect.</strong> " + q.explanation;
        }
        document.getElementById("validateBtn").disabled = true;
        setTimeout(function () {
          currentQuestion++;
          renderQuestion();
        }, 3000);
      }

      function showScore() {
        document.getElementById("quizContainer").innerHTML = "";
        document.getElementById("progressBar").style.width = "100%";
        document.getElementById("progressText").textContent = "Termine !";
        const sc = document.getElementById("scoreContainer");
        sc.classList.remove("hidden");
        const pct = Math.round((score / questions.length) * 100);
        let msg =
          pct >= 80
            ? "Excellent travail !"
            : pct >= 60
              ? "Bon travail, quelques points a revoir."
              : "Continuez a etudier, vous progresserez !";
        sc.innerHTML =
          '<div class="score">' +
          score +
          " / " +
          questions.length +
          '</div><div class="score-label">' +
          pct +
          "% — " +
          msg +
          '</div><button class="btn-restart" onclick="restart()">Recommencer</button>';
      }

      function restart() {
        currentQuestion = 0;
        score = 0;
        answered = false;
        renderQuestion();
      }
      renderQuestion();
    </script>
  </body>
</html>
