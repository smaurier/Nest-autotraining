<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz 19 — Auth NestJS</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 2rem 1rem; }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { text-align: center; margin-bottom: 0.5rem; font-size: 1.8rem; color: #ffffff; }
    .subtitle { text-align: center; color: #8892b0; margin-bottom: 2rem; font-size: 1rem; }
    .progress-bar-container { background: #0d1117; border-radius: 10px; height: 14px; margin-bottom: 2rem; overflow: hidden; }
    .progress-bar { background: linear-gradient(90deg, #0d6efd, #4dabf7); height: 100%; width: 0%; border-radius: 10px; transition: width 0.4s ease; }
    .progress-text { text-align: center; color: #8892b0; margin-bottom: 1rem; font-size: 0.9rem; }
    .card { background: #16213e; border-radius: 12px; padding: 2rem; margin-bottom: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3); }
    .question-label { font-size: 0.85rem; color: #4dabf7; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem; }
    .question-text { font-size: 1.15rem; margin-bottom: 1.2rem; line-height: 1.5; color: #ffffff; }
    pre { background: #0d1117; border: 1px solid #30363d; border-radius: 8px; padding: 1rem; margin-bottom: 1.2rem; overflow-x: auto; font-size: 0.95rem; }
    code { font-family: 'Consolas', 'Fira Code', 'Courier New', monospace; color: #c9d1d9; }
    .options { list-style: none; }
    .options li { margin-bottom: 0.5rem; }
    .options label { display: flex; align-items: center; gap: 0.75rem; padding: 0.8rem 1rem; background: #0d1117; border: 2px solid #30363d; border-radius: 8px; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-size: 1rem; }
    .options label:hover { border-color: #4dabf7; background: #1c2a4a; }
    .options input[type="radio"] { accent-color: #0d6efd; width: 18px; height: 18px; flex-shrink: 0; }
    .btn { display: inline-block; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background 0.2s, transform 0.1s; }
    .btn-primary { background: #0d6efd; color: #fff; }
    .btn-primary:hover { background: #3b82f6; }
    .btn-primary:disabled { background: #374151; cursor: not-allowed; }
    .btn-restart { background: #238636; color: #fff; margin-top: 1rem; padding: 0.7rem 2rem; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .btn-restart:hover { background: #2ea043; }
    .feedback { margin-top: 1rem; padding: 1rem 1.2rem; border-radius: 8px; font-size: 0.95rem; line-height: 1.5; display: none; }
    .feedback.correct { background: #0f5132; border: 1px solid #198754; color: #d1fae5; display: block; }
    .feedback.wrong { background: #842029; border: 1px solid #dc3545; color: #fdd; display: block; }
    .score-card { text-align: center; padding: 3rem 2rem; }
    .score-card .score { font-size: 3rem; font-weight: 700; color: #4dabf7; margin-bottom: 0.5rem; }
    .score-card .score-label { font-size: 1.2rem; color: #8892b0; margin-bottom: 1.5rem; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Quiz 19 — Auth NestJS</h1>
    <p class="subtitle">Passport, JWT, Guards, RBAC</p>
    <div class="progress-bar-container"><div class="progress-bar" id="progressBar"></div></div>
    <p class="progress-text" id="progressText">Question 1 / 5</p>
    <div id="quizContainer"></div>
    <div id="scoreContainer" class="card score-card hidden"></div>
  </div>
  <script>
    const questions = [
      {
        label: "Code",
        text: "Que fait cette strategie Passport JWT dans NestJS ?",
        code: "@Injectable()\nexport class JwtStrategy extends PassportStrategy(Strategy) {\n  constructor() {\n    super({\n      jwtFromRequest: ExtractJwt.fromAuthHeaderAsBearerToken(),\n      secretOrKey: 'mySecret',\n    });\n  }\n\n  validate(payload: { sub: number; email: string }) {\n    return { userId: payload.sub, email: payload.email };\n  }\n}",
        options: [
          "Elle genere un nouveau JWT a chaque requete",
          "Elle extrait et verifie le JWT du header Authorization, puis retourne l'utilisateur",
          "Elle hash le mot de passe de l'utilisateur",
          "Elle redirige vers une page de login"
        ],
        answer: 1,
        explanation: "La strategie JWT extrait le token du header 'Authorization: Bearer xxx', verifie sa signature avec le secret, et appelle validate() avec le payload decode. L'objet retourne par validate() est attache a req.user. Si le token est invalide ou expire, une 401 est renvoyee automatiquement."
      },
      {
        label: "Code",
        text: "Comment proteger une route avec le JwtAuthGuard ?",
        code: "@Controller('profile')\nexport class ProfileController {\n  @???(JwtAuthGuard)\n  @Get()\n  getProfile(@Req() req) {\n    return req.user;\n  }\n}",
        options: ["@Guard", "@UseGuards", "@Protect", "@Auth"],
        answer: 1,
        explanation: "@UseGuards(JwtAuthGuard) applique le guard sur la route ou le controller. Le guard utilise la strategie JWT pour valider le token. Si le token est valide, req.user est disponible. Sinon, une reponse 401 Unauthorized est renvoyee. On peut appliquer le guard au niveau methode, controller, ou global."
      },
      {
        label: "Code",
        text: "Comment implementer le controle d'acces par role (RBAC) ?",
        code: "@Injectable()\nexport class RolesGuard implements CanActivate {\n  constructor(private reflector: Reflector) {}\n\n  canActivate(context: ExecutionContext): boolean {\n    const roles = this.reflector.get&lt;string[]&gt;('roles', context.getHandler());\n    if (!roles) return true;\n    const { user } = context.switchToHttp().getRequest();\n    return roles.includes(user.role);\n  }\n}\n\n// Usage:\n@???(\'admin\')\n@UseGuards(JwtAuthGuard, RolesGuard)\n@Delete(':id')\nremove() {}",
        options: ["@Role", "@Roles", "@Permission", "@Access"],
        answer: 1,
        explanation: "@Roles('admin') est un decorateur personnalise qui attache les roles requis comme metadonnees. Le RolesGuard utilise Reflector pour lire ces metadonnees et les comparer au role de l'utilisateur authentifie. Ce pattern separe l'authentification (JwtAuthGuard) de l'autorisation (RolesGuard)."
      },
      {
        label: "Pourquoi ?",
        text: "Pourquoi utilise-t-on Passport.js avec NestJS plutot qu'une implementation manuelle ?",
        code: null,
        options: [
          "Parce que NestJS ne peut pas gerer l'authentification seul",
          "Pour beneficier d'un ecosysteme riche de strategies (JWT, OAuth, Google, GitHub) et d'une architecture standardisee",
          "Parce que Passport est plus rapide que le code natif",
          "Pour eviter d'utiliser des Guards"
        ],
        answer: 1,
        explanation: "Passport.js propose plus de 500 strategies d'authentification (JWT, OAuth2, Google, Facebook, SAML, etc.). Son integration avec NestJS via @nestjs/passport fournit une architecture propre avec des strategies injectables et des guards reutilisables. Cela evite de reinventer la roue pour chaque methode d'auth."
      },
      {
        label: "Concept",
        text: "Quelle est la difference entre authentification et autorisation ?",
        code: null,
        options: [
          "Ce sont des synonymes",
          "L'authentification verifie l'identite (qui es-tu ?), l'autorisation verifie les permissions (que peux-tu faire ?)",
          "L'authentification est cote client, l'autorisation cote serveur",
          "L'authentification utilise JWT, l'autorisation utilise des cookies"
        ],
        answer: 1,
        explanation: "L'authentification (AuthN) repond a 'Qui es-tu ?' en verifiant l'identite via credentials, JWT, OAuth. L'autorisation (AuthZ) repond a 'Que peux-tu faire ?' en verifiant les roles/permissions. Dans NestJS, le JwtAuthGuard gere l'authentification, et le RolesGuard gere l'autorisation."
      }
    ];

    let currentQuestion = 0, score = 0, answered = false;

    function renderQuestion() {
      if (currentQuestion >= questions.length) { showScore(); return; }
      const q = questions[currentQuestion];
      const pct = (currentQuestion / questions.length) * 100;
      document.getElementById('progressBar').style.width = pct + '%';
      document.getElementById('progressText').textContent = 'Question ' + (currentQuestion + 1) + ' / ' + questions.length;
      let html = '<div class="card">';
      html += '<div class="question-label">' + q.label + '</div>';
      html += '<div class="question-text">' + q.text + '</div>';
      if (q.code) html += '<pre><code>' + q.code + '</code></pre>';
      html += '<ul class="options">';
      q.options.forEach(function(opt, i) {
        html += '<li><label><input type="radio" name="q" value="' + i + '"> ' + opt + '</label></li>';
      });
      html += '</ul>';
      html += '<button class="btn btn-primary" id="validateBtn" onclick="validate()" disabled>Valider</button>';
      html += '<div class="feedback" id="feedback"></div>';
      html += '</div>';
      document.getElementById('quizContainer').innerHTML = html;
      document.getElementById('scoreContainer').classList.add('hidden');
      answered = false;
      document.querySelectorAll('input[name="q"]').forEach(function(input) {
        input.addEventListener('change', function() {
          document.getElementById('validateBtn').disabled = false;
        });
      });
    }

    function validate() {
      if (answered) return;
      answered = true;
      const selected = document.querySelector('input[name="q"]:checked');
      if (!selected) return;
      const val = parseInt(selected.value);
      const q = questions[currentQuestion];
      const fb = document.getElementById('feedback');
      if (val === q.answer) {
        score++;
        fb.className = 'feedback correct';
        fb.innerHTML = '<strong>Correct !</strong> ' + q.explanation;
      } else {
        fb.className = 'feedback wrong';
        fb.innerHTML = '<strong>Incorrect.</strong> ' + q.explanation;
      }
      document.getElementById('validateBtn').disabled = true;
      setTimeout(function() { currentQuestion++; renderQuestion(); }, 3000);
    }

    function showScore() {
      document.getElementById('quizContainer').innerHTML = '';
      document.getElementById('progressBar').style.width = '100%';
      document.getElementById('progressText').textContent = 'Termine !';
      const sc = document.getElementById('scoreContainer');
      sc.classList.remove('hidden');
      const pct = Math.round((score / questions.length) * 100);
      let msg = pct >= 80 ? 'Excellent travail !' : pct >= 60 ? 'Bon travail, quelques points a revoir.' : 'Continuez a etudier, vous progresserez !';
      sc.innerHTML = '<div class="score">' + score + ' / ' + questions.length + '</div><div class="score-label">' + pct + '% — ' + msg + '</div><button class="btn-restart" onclick="restart()">Recommencer</button>';
    }

    function restart() { currentQuestion = 0; score = 0; answered = false; renderQuestion(); }
    renderQuestion();
  </script>
</body>
</html>
